<div
  class="c-field"
  [class]="className()"
  [class.is-invalid]="hasError()">
  <label
    [for]="id()"
    class="c-field__label">
    {{ label() | translate }}
  </label>

  <div class="c-field__wrapper">
    <input
      [id]="id()"
      [type]="inputType()"
      [formControl]="control()"
      [placeholder]="placeholder() | translate"
      (focus)="isFocused.set(true)"
      (blur)="isFocused.set(false)"
      [inputFocus]="behaviors()?.autofocus"
      [inputTitleCase]="behaviors()?.titleCase"
      [autocomplete]="autocomplete()"
      class="c-field__input" />

    @if (isPassword() && behaviors()?.hasPasswordToggle) {
      <button
        type="button"
        class="c-field__toggle"
        (click)="togglePassword()"
        [attr.aria-label]="
          (showPassword() ? 'UI.FORMS.ACTIONS.HIDE_PASSWORD' : 'UI.FORMS.ACTIONS.SHOW_PASSWORD') | translate
        ">
        <fa-icon [icon]="showPassword() ? faEyeSlash : faEye" />
      </button>
    }
  </div>

  <div class="c-field__error">
      @if (hasError()) {
      <span>
        <fa-icon [icon]="faCircleExclamation" /> {{ errorKey() | translate }}
      </span>
    }
    </div>
</div>
