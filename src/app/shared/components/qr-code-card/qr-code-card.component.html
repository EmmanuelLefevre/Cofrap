<div class="qr-card">
  <h2 class="qr-card__title">{{ title() | translate }}</h2>

  <div class="qr-card__image-container">
    <img
      [src]="sanitizedQrCode"
      alt=""
      [alt]="'UI.QR_CARD.ALT_TEXT' | translate" />
  </div>

  <div class="qr-card__data">
    <code>{{ rawValue() }}</code>
    <main-button
      label="UI.ACTIONS.COPY"
      variant="primary"
      (clicked)="onCopy()" />
  </div>

  @if (showCheckbox()) {
    <div class="qr-card__confirm">
      <label>
        <input
          type="checkbox"
          (change)="onCheckboxChange($event)" />
        <span>{{ 'UI.QR_CARD.CONFIRM_COPY' | translate }}</span>
      </label>
    </div>
  }
</div>
